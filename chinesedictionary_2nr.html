<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Словарь Кондрашевского — Том 1</title>
<style>
  html, body { margin: 0; padding: 0; }
  body { background: #faf5ec; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    color: #78716c;
    background: #faf5ec; z-index: 100;
    transition: opacity .4s ease;
  }
  #boot .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #8b2822;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: .3; transform: scale(.8); }
    50%      { opacity: 1;  transform: scale(1.2); }
  }
  #boot.fade { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
<div id="boot">
  <div style="font-size: 32px; color: #8b2822; font-weight: 600; font-family: serif;">词</div>
  <div class="dot"></div>
  <div style="font-size: 13px;">Загрузка словаря…</div>
</div>
<div id="root"></div>
